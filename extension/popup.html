<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #2a2a35;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .tabs {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a35;
    }
    .tab {
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .tab:hover { background: #1a1a24; color: #ccc; }
    .tab.active { background: rgba(108,92,231,0.15); color: #a78bfa; }
    .content {
      padding: 12px 16px;
      max-height: 400px;
      overflow-y: auto;
    }
    .cookie-box {
      background: #1a1a24;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.5;
      word-break: break-all;
      color: #c4c4c4;
      max-height: 200px;
      overflow-y: auto;
      cursor: text;
      user-select: all;
    }
    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #a78bfa;
      background: rgba(108,92,231,0.1);
      color: #a78bfa;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .copy-btn:hover { background: rgba(108,92,231,0.25); }
    .copy-btn.copied { border-color: #4ade80; color: #4ade80; background: rgba(74,222,128,0.1); }
    .empty {
      text-align: center;
      padding: 30px;
      color: #666;
      font-size: 12px;
    }
    .cookie-count {
      font-size: 11px;
      color: #666;
      padding: 8px 16px 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Kalodata Cookies</h1>
  </div>

  <div class="tabs">
    <button class="tab active" data-domain="kalodata">Kalodata</button>
    <button class="tab" data-domain="kalowave">Kalowave</button>
  </div>

  <div class="cookie-count" id="count"></div>

  <div class="content">
    <div class="cookie-box" id="cookies"></div>
    <button class="copy-btn" id="copy">Copiar Cookies</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
