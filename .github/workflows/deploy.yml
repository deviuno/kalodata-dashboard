# Deploy automático no servidor a cada push pra main.
# Secrets necessários: SSH_HOST, SSH_USER, SSH_KEY, SSH_PATH (e SSH_PORT opcional)
# PROXY_URL_TEMPLATE: URL do proxy geo-aware com {CC} como placeholder de país

name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Pull, install, restart
        env:
          PROXY_URL_TEMPLATE: ${{ secrets.PROXY_URL_TEMPLATE }}
        run: |
          # Step 1: Write ecosystem.config.cjs with PROXY_URL_TEMPLATE to VPS
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            python3 -c "
import os,json
cfg = {'apps':[{'name':'kalodata-scraper','script':'server.js','cwd':'/root/kalodata-dashboard','env':{'NODE_ENV':'production','PORT':4001,'PROXY_URL_TEMPLATE': os.environ.get('PROXY_TMPL','')}}]}
open('/root/kalodata-dashboard/ecosystem.config.cjs','w').write('module.exports = '+json.dumps(cfg,separators=(',',':')))
print('ecosystem.config.cjs written OK')
" \
            PROXY_TMPL="$PROXY_URL_TEMPLATE"
          # Step 2: Pull latest code, install deps, reload PM2
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'EOF'
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          NODE_BIN=$(ls -d $NVM_DIR/versions/node/*/bin 2>/dev/null | head -1)
          [ -n "$NODE_BIN" ] && export PATH="$NODE_BIN:$PATH"
          echo "==> Using node: $(which node 2>/dev/null || echo 'NOT FOUND')"
          echo "==> Pulling latest from main"
          git -C /root/kalodata-dashboard fetch origin main
          git -C /root/kalodata-dashboard reset --hard origin/main
          echo "==> Installing dependencies (production-only)"
          cd /root/kalodata-dashboard && npm install --omit=dev --no-audit --no-fund
          echo "==> Restarting service"
          if command -v pm2 >/dev/null 2>&1 && pm2 describe kalodata-scraper >/dev/null 2>&1; then
            pm2 reload kalodata-scraper --update-env
            pm2 save
          elif systemctl list-unit-files | grep -q kalodata-scraper; then
            sudo systemctl restart kalodata-scraper
          else
            echo "AVISO: nem pm2 nem systemd encontrados."
            exit 1
          fi
          echo "==> Deploy OK"
          EOF
