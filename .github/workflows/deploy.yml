name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Write ecosystem.config.cjs
        env:
          PROXY_URL_TEMPLATE: ${{ secrets.PROXY_URL_TEMPLATE }}
        run: |
          ECO=$(printf 'module.exports={apps:[{name:"kalodata-scraper",script:"server.js",cwd:"/root/kalodata-dashboard",env:{NODE_ENV:"production",PORT:4001,PROXY_URL_TEMPLATE:"%s"}}]}' "$PROXY_URL_TEMPLATE" | base64 -w0)
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo $ECO | base64 -d > /root/kalodata-dashboard/ecosystem.config.cjs"

      - name: Pull, install, restart
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'EOF'
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          NODE_BIN=$(ls -d $NVM_DIR/versions/node/*/bin 2>/dev/null | head -1)
          [ -n "$NODE_BIN" ] && export PATH="$NODE_BIN:$PATH"
          echo node version: $(node --version 2>/dev/null || echo NOT_FOUND)
          git -C /root/kalodata-dashboard fetch origin main
          git -C /root/kalodata-dashboard reset --hard origin/main
          cd /root/kalodata-dashboard && npm install --omit=dev --no-audit --no-fund
          pm2 startOrReload /root/kalodata-dashboard/ecosystem.config.cjs --update-env
          pm2 save
          echo Deploy OK
          EOF
