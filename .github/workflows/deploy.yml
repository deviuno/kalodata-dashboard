# Sprint 0 / S0-1 — Deploy automático no servidor 187.127.0.217 a cada
# push pra main. Substitui SSH manual.
#
# **Configuração necessária (uma vez)** nos repo settings:
#   Settings → Secrets and variables → Actions → New repository secret
#   - SSH_HOST: 187.127.0.217
#   - SSH_USER: <usuário do servidor, ex: root>
#   - SSH_KEY: <chave privada SSH (id_ed25519 inteiro com BEGIN/END)>
#   - SSH_PATH: <caminho do projeto no servidor, ex: /root/kalodata-dashboard>
#   - SSH_PORT: 22 (opcional, default 22)
#
# Depois disso, cada push pra main faz git pull + npm install + restart.

name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: Pull, install, restart
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'EOF'
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          if [ -d "$NVM_DIR/versions/node" ]; then
            NODE_BIN=$(ls -d $NVM_DIR/versions/node/*/bin 2>/dev/null | head -1)
            [ -n "$NODE_BIN" ] && export PATH="$NODE_BIN:$PATH"
          fi
          echo "==> Using node: $(which node 2>/dev/null || echo 'NOT FOUND')"
          echo "==> Using pm2: $(which pm2 2>/dev/null || echo 'NOT FOUND')"
          cd ${{ secrets.SSH_PATH }}
          echo "==> Pulling latest from main"
          git fetch origin main
          git reset --hard origin/main
          echo "==> Installing dependencies (production-only)"
          npm install --omit=dev --no-audit --no-fund
          echo "==> Restarting service"
          if command -v pm2 >/dev/null 2>&1 && pm2 describe kalodata-scraper >/dev/null 2>&1; then
            pm2 restart kalodata-scraper --update-env
            pm2 save
          elif systemctl list-unit-files | grep -q kalodata-scraper; then
            sudo systemctl restart kalodata-scraper
          else
            echo "AVISO: nem pm2 nem systemd encontrados — startup manual ainda necessário."
            exit 1
          fi
          echo "==> Verifying health (port 4001)"
          sleep 2
          curl -fsS http://localhost:4001/api/health || (echo "Health check falhou"; exit 1)
          echo "==> Deploy OK"
          EOF
      - name: Acceptance tests (viewers_count + categoryId)
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'EOF'
          ID=7642655011708635905

          echo "=== Ajuste 1: viewers_count ==="
          curl -s "http://localhost:4001/api/live/$ID/detail" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']; print('viewers_count:', d.get('viewers_count'), 'viewers_count_label:', d.get('viewers_count_label'))"

          echo "=== Categorias disponíveis ==="
          curl -s "http://localhost:4001/api/live/$ID/categories" | python3 -c "import sys,json; r=json.load(sys.stdin); cats=r.get('data',[]); [print('cat:', c.get('id'), c.get('name'), 'count:', c.get('count')) for c in cats]"

          echo "=== Ajuste 2: produtos sem filtro ==="
          curl -s "http://localhost:4001/api/live/$ID/products?page=1&pageSize=5&sortField=revenue" | python3 -c "import sys,json; r=json.load(sys.stdin); print('total:', r['total'], 'items:', len(r.get('data',[])))"

          echo "=== Ajuste 2: produtos com filtro 604579 ==="
          curl -s "http://localhost:4001/api/live/$ID/products?page=1&pageSize=5&sortField=revenue&categoryId=604579" | python3 -c "import sys,json; r=json.load(sys.stdin); print('total:', r['total'], 'items:', len(r.get('data',[])))"

          echo "=== DONE ==="
          EOF

