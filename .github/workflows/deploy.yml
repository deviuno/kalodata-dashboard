# Sprint 0 / S0-1 — Deploy automático no servidor 187.127.0.217 a cada
# push pra main. Substitui SSH manual.
#
# **Configuração necessária (uma vez)** nos repo settings:
#   Settings → Secrets and variables → Actions → New repository secret
#   - SSH_HOST: 187.127.0.217
#   - SSH_USER: <usuário do servidor, ex: root>
#   - SSH_KEY: <chave privada SSH (id_ed25519 inteiro com BEGIN/END)>
#   - SSH_PATH: <caminho do projeto no servidor, ex: /root/kalodata-dashboard>
#   - SSH_PORT: 22 (opcional, default 22)
#
# Depois disso, cada push pra main faz git pull + npm install + restart.

name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Pull, install, restart
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'EOF'
            set -e
            # Sessão SSH do GitHub Actions é não-interativa e não carrega o
            # ~/.bashrc/.profile, então PATH não tem o pm2 do nvm. Carregamos
            # o nvm explicitamente e exportamos o bin do node ativo no PATH
            # antes de qualquer comando que dependa de pm2/npm.
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            if [ -d "$NVM_DIR/versions/node" ]; then
              # Pega a versão de node ativa (default ou primeira disponível)
              NODE_BIN=$(ls -d $NVM_DIR/versions/node/*/bin 2>/dev/null | head -1)
              [ -n "$NODE_BIN" ] && export PATH="$NODE_BIN:$PATH"
            fi
            echo "==> Using node: $(which node 2>/dev/null || echo 'NOT FOUND')"
            echo "==> Using pm2:  $(which pm2 2>/dev/null  || echo 'NOT FOUND')"

            cd ${{ secrets.SSH_PATH }}
            echo "==> Pulling latest from main"
            git fetch origin main
            git reset --hard origin/main
            echo "==> Installing dependencies (production-only)"
            npm install --omit=dev --no-audit --no-fund

            echo "==> Restarting service"
            # Process name real do servidor é `kalodata-scraper` (não dashboard).
            # Tenta pm2 primeiro; fallback systemd.
            if command -v pm2 >/dev/null 2>&1 && pm2 describe kalodata-scraper >/dev/null 2>&1; then
              pm2 restart kalodata-scraper --update-env
              pm2 save
            elif systemctl list-unit-files | grep -q kalodata-scraper; then
              sudo systemctl restart kalodata-scraper
            else
              echo "AVISO: nem pm2 nem systemd encontrados — startup manual ainda necessário."
              exit 1
            fi

            echo "==> Verifying health (port 4001)"
            sleep 2
            curl -fsS http://localhost:4001/api/health || (echo "Health check falhou"; exit 1)
            echo "==> Deploy OK"
          EOF

      - name: Acceptance tests (viewers_count + categoryId)
        run: |
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'EOF'
          set -e
          ID=7642655011708635905
          CAT_ID=604579

          echo "=== Ajuste 1: viewers_count ==="
          DETAIL=$(curl -s "http://localhost:4001/api/live/$ID/detail")
          echo "$DETAIL" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']; print('viewers_count:', d.get('viewers_count')); print('viewers_count_label:', d.get('viewers_count_label'))"

          echo "=== Ajuste 2: categoryId filter ==="
          NO_FILTER=$(curl -s "http://localhost:4001/api/live/$ID/products?page=1&pageSize=20&sortField=revenue" | python3 -c "import sys,json; print(json.load(sys.stdin)['total'])")
          WITH_FILTER=$(curl -s "http://localhost:4001/api/live/$ID/products?page=1&pageSize=20&sortField=revenue&categoryId=$CAT_ID" | python3 -c "import sys,json; print(json.load(sys.stdin)['total'])")
          echo "Sem filtro: $NO_FILTER | Com filtro categoria $CAT_ID: $WITH_FILTER"
          echo "=== DONE ==="
          EOF
