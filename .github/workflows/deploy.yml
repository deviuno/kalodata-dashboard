# Sprint 0 / S0-1 — Deploy automático no servidor 187.127.0.217 a cada
# push pra main. Substitui SSH manual.
#
# **Configuração necessária (uma vez)** nos repo settings:
#   Settings → Secrets and variables → Actions → New repository secret
#   - SSH_HOST: 187.127.0.217
#   - SSH_USER: <usuário do servidor, ex: root>
#   - SSH_KEY: <chave privada SSH (id_ed25519 inteiro com BEGIN/END)>
#   - SSH_PATH: <caminho do projeto no servidor, ex: /root/kalodata-dashboard>
#   - SSH_PORT: 22 (opcional, default 22)
#
# Depois disso, cada push pra main faz git pull + npm install + restart.

name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: Pull, install, restart
        env:
          PROXY_URL_TEMPLATE: ${{ secrets.PROXY_URL_TEMPLATE }}
        run: |
          # Escreve ecosystem.config.cjs na VPS com PROXY_URL_TEMPLATE do secret
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p /root/kalodata-dashboard && cat > /root/kalodata-dashboard/ecosystem.config.cjs" << ECOCFG
module.exports = {apps:[{name:"kalodata-scraper",script:"server.js",cwd:"/root/kalodata-dashboard",env:{NODE_ENV:"production",PORT:4001,PROXY_URL_TEMPLATE:"$PROXY_URL_TEMPLATE"}}]}
ECOCFG
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'EOF'
          set -e
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          NODE_BIN=$(ls -d $NVM_DIR/versions/node/*/bin 2>/dev/null | head -1)
          [ -n "$NODE_BIN" ] && export PATH="$NODE_BIN:$PATH"
          echo "==> Using node: $(which node 2>/dev/null || echo 'NOT FOUND')"
          echo "==> Pulling latest from main"
          git -C /root/kalodata-dashboard fetch origin main
          git -C /root/kalodata-dashboard reset --hard origin/main
          echo "==> Installing dependencies (production-only)"
          cd /root/kalodata-dashboard
          npm install --omit=dev --no-audit --no-fund
          echo "==> Restarting service (pm2 reload com --update-env)"
          if command -v pm2 >/dev/null 2>&1 && pm2 describe kalodata-scraper >/dev/null 2>&1; then
            pm2 reload kalodata-scraper --update-env
            pm2 save
          elif systemctl list-unit-files | grep -q kalodata-scraper; then
            sudo systemctl restart kalodata-scraper
          else
            echo "AVISO: nem pm2 nem systemd encontrados — startup manual ainda necessario."
            exit 1
          fi
          echo "==> Deploy OK"
          EOF
